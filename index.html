<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wilde Automations - Mission Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --dark-mid: #1e293b;
            --dark-light: #334155;
            --gray: #64748b;
            --light: #f1f5f9;
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; }
        
        /* Top Bar */
        .topbar { height: 72px; background: var(--dark-mid); border-bottom: 1px solid var(--dark-light); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
        
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--success)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .logo-text { font-weight: 700; font-size: 1.1rem; }
        .logo-text span { color: var(--primary); }
        
        /* Company Tabs */
        .company-tabs { display: flex; gap: 4px; }
        .company-tab { padding: 10px 20px; border-radius: 8px; background: transparent; border: none; color: var(--gray); font-weight: 500; cursor: pointer; transition: 0.2s; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .company-tab:hover { background: var(--dark-light); color: var(--white); }
        .company-tab.active { background: var(--dark-light); color: var(--white); }
        .company-tab .dot { width: 8px; height: 8px; border-radius: 50%; }
        
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .status-badge { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(16, 185, 129, 0.15); border-radius: 20px; color: var(--success); font-size: 0.8rem; font-weight: 600; }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        
        /* Main Content */
        .main { padding-top: 72px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        /* Company View */
        .company-view { display: none; }
        .company-view.active { display: block; }
        
        /* Stats Row */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: var(--dark-mid); border-radius: 12px; padding: 20px; border: 1px solid var(--dark-light); }
        .stat-card .label { font-size: 0.75rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-card .value { font-size: 2rem; font-weight: 700; }
        .stat-card .value.primary { color: var(--primary); }
        .stat-card .value.success { color: var(--success); }
        .stat-card .value.warning { color: var(--warning); }
        .stat-card .value.danger { color: var(--danger); }
        
        /* Sections */
        .section { margin-bottom: 32px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-title { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        /* Task Cards */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
        .task-card { background: var(--dark-mid); border-radius: 12px; padding: 20px; border: 1px solid var(--dark-light); }
        .task-card h4 { font-size: 0.95rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .task-card p { font-size: 0.85rem; color: var(--gray); margin-bottom: 12px; }
        .task-meta { display: flex; gap: 16px; font-size: 0.75rem; color: var(--gray); }
        .task-meta span { display: flex; align-items: center; gap: 4px; }
        
        .priority-high { border-left: 3px solid var(--danger); }
        .priority-medium { border-left: 3px solid var(--warning); }
        .priority-low { border-left: 3px solid var(--success); }
        
        .status-badge-item { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .status-done { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status-progress { background: rgba(14, 165, 233, 0.2); color: var(--primary); }
        .status-todo { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .status-blocked { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        /* Actions List */
        .action-list { display: flex; flex-direction: column; gap: 12px; }
        .action-item { background: var(--dark-mid); border-radius: 10px; padding: 16px; border: 1px solid var(--dark-light); display: flex; justify-content: space-between; align-items: center; }
        .action-info h4 { font-size: 0.95rem; margin-bottom: 4px; }
        .action-info p { font-size: 0.8rem; color: var(--gray); }
        .action-btn { padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 500; cursor: pointer; font-size: 0.85rem; }
        .action-btn:hover { background: var(--primary-dark); }
        
        /* Project Links */
        .project-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
        .project-link-card { background: var(--dark-mid); border-radius: 10px; padding: 16px; border: 1px solid var(--dark-light); display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: var(--white); transition: 0.2s; }
        .project-link-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .project-link-info { display: flex; align-items: center; gap: 12px; }
        .project-link-icon { width: 36px; height: 36px; background: var(--dark-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .project-link-name { font-weight: 500; }
        .project-link-status { font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; background: rgba(16, 185, 129, 0.2); color: var(--success); }
        
        /* Team Activity */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
        .team-card { background: var(--dark-mid); border-radius: 12px; padding: 20px; border: 1px solid var(--dark-light); }
        .team-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .team-avatar { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .team-name { font-weight: 600; }
        .team-role { font-size: 0.8rem; color: var(--gray); }
        .team-status { margin-left: auto; display: flex; align-items: center; gap: 4px; font-size: 0.75rem; color: var(--success); }
        .team-task { background: var(--dark); border-radius: 8px; padding: 12px; font-size: 0.85rem; color: var(--gray); }
        .team-task strong { color: var(--primary); }
        
        /* Settings Panel */
        .settings-panel { display: none; }
        .settings-panel.active { display: block; }
        .settings-card { background: var(--dark-mid); border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--dark-light); }
        .settings-card h3 { margin-bottom: 16px; font-size: 1rem; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--gray); margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; background: var(--dark); border: 1px solid var(--dark-light); border-radius: 8px; color: var(--white); font-size: 0.9rem; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .company-tabs { display: none; }
            .task-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="topbar">
        <div class="logo-area">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">Wilde <span>Automations</span></div>
        </div>
        
        <div class="company-tabs" id="companyTabs">
            <!-- Generated by JS -->
        </div>
        
        <div class="topbar-right">
            <button class="company-tab" onclick="showSettings()">
                <i class="fas fa-cog"></i> Settings
            </button>
            <div class="status-badge">
                <span class="status-dot"></span>
                All Systems Active
            </div>
        </div>
    </div>
    
    <div class="main">
        <div class="container">
            
            <!-- Company Views -->
            <div id="companyViews">
                <!-- Generated by JS -->
            </div>
            
            <!-- Settings Panel -->
            <div id="settings" class="settings-panel">
                <div class="section-title" style="margin-bottom: 24px;"><i class="fas fa-cog"></i> Settings</div>
                
                <div class="settings-card">
                    <h3>Add New Project</h3>
                    <div class="form-group">
                        <label>Project Name</label>
                        <input type="text" id="newProjectName" placeholder="e.g., New App">
                    </div>
                    <div class="form-group">
                        <label>Company</label>
                        <select id="newProjectCompany">
                            <option value="">Select company...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="newProjectDesc" rows="2" placeholder="Brief description..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>App URL</label>
                        <input type="url" id="newProjectUrl" placeholder="https://...">
                    </div>
                    <button class="action-btn" onclick="addProject()">Add Project</button>
                </div>
                
                <div class="settings-card">
                    <h3>Add New Company</h3>
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="newCompanyName" placeholder="e.g., New Company">
                    </div>
                    <button class="action-btn" onclick="addCompany()">Add Company</button>
                </div>
                
                <div class="settings-card">
                    <h3>Reset Data</h3>
                    <p style="color: var(--gray); font-size: 0.85rem; margin-bottom: 12px;">Reset all data to default values.</p>
                    <button class="action-btn" style="background: var(--danger);" onclick="resetData()">Reset to Defaults</button>
                </div>
            </div>
            
        </div>
    </div>
    
    <script>
        const STORAGE_KEY = 'wilde_mission_control';
        
        // Default Data
        const defaultData = {
            companies: [
                {
                    id: 'clinic-iq',
                    name: 'Clinic IQ',
                    icon: '🏥',
                    color: '#0ea5e9',
                    projects: [
                        { id: 'inventory', name: 'Inventory Tool', desc: 'Clinic inventory management', status: 'Live', url: 'https://jack108510.github.io/inventoryintaketool/' },
                        { id: 'pricing', name: 'Price Management', desc: 'Pricing optimization dashboard', status: 'Live', url: 'https://jack108510.github.io/jsw-clinic-iq/' },
                        { id: 'payroll', name: 'Payroll App', desc: 'HR & Payroll management', status: 'Live', url: 'https://jack108510.github.io/jsw-payroll-pro/' },
                        { id: 'client', name: 'Client Hub', desc: 'Client communication', status: 'Live', url: 'https://jack108510.github.io/jsw-client-hub/' }
                    ],
                    completed: [
                        { title: 'Dashboard v2 complete', date: '2026-03-16' },
                        { title: 'Inventory Tool launched', date: '2026-03-15' },
                        { title: 'Client Hub deployed', date: '2026-03-14' }
                    ],
                    inProgress: [
                        { title: 'Adding localStorage persistence', priority: 'medium' }
                    ],
                    todo: [
                        { title: 'Set up AWS server for n8n', priority: 'high' },
                        { title: 'Add more Clinic IQ features', priority: 'medium' }
                    ],
                    actions: [
                        { title: 'Provide AWS credentials', desc: 'Give SSH access for server setup', priority: 'high' },
                        { title: 'Review new features', desc: 'Test and approve new functionality', priority: 'medium' }
                    ]
                },
                {
                    id: 'wilde-auto',
                    name: 'Wilde Automations',
                    icon: '⚡',
                    color: '#10b981',
                    projects: [
                        { id: 'ai-recep', name: 'AI Receptionist', desc: '24/7 AI phone answering', status: 'Live', url: 'https://jack108510.github.io/jsw-ai-receptionist/' },
                        { id: 'n8n', name: 'n8n Automation', desc: 'Workflow automation services', status: 'Live', url: 'https://jack108510.github.io/jsw-n8n-automation/' },
                        { id: 'policy', name: 'Policy Pro', desc: 'Policy management', status: 'Live', url: 'https://jack108510.github.io/clinic-policy-manager/' }
                    ],
                    completed: [
                        { title: 'Wilde Automations website launched', date: '2026-03-16' },
                        { title: 'Policy Pro landing page complete', date: '2026-03-16' },
                        { title: 'Business plan created', date: '2026-03-16' }
                    ],
                    inProgress: [
                        { title: 'Setting up client outreach', priority: 'medium' }
                    ],
                    todo: [
                        { title: 'Find first automation clients', priority: 'high' },
                        { title: 'Set up Discord integration', priority: 'medium' }
                    ],
                    actions: [
                        { title: 'Provide Discord channel info', desc: 'Server ID or webhook URL', priority: 'medium' },
                        { title: 'Approve outreach emails', desc: 'Review and approve email templates', priority: 'low' }
                    ]
                }
            ],
            team: [
                { name: 'Golias', role: 'Chief of Staff', icon: '🛡️', color: '#10b981', task: 'Managing operations and coordinating team' },
                { name: 'Effy', role: 'Director of Development', icon: '💻', color: '#0ea5e9', task: 'Building and improving web applications' },
                { name: 'Gretel', role: 'Content Director', icon: '🎨', color: '#ec4899', task: 'Designing and creating content' },
                { name: 'Stan', role: 'Research Director', icon: '🔍', color: '#f59e0b', task: 'Researching opportunities and insights' },
                { name: 'JR', role: 'Quality Assurance', icon: '✅', color: '#8b5cf6', task: 'Testing and ensuring quality' }
            ]
        };
        
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    console.error('Failed to parse saved data:', e);
                }
            }
            return JSON.parse(JSON.stringify(defaultData));
        }
        
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        function resetData() {
            if (confirm('Reset all data to defaults?')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }
        
        let data = loadData();
        let currentCompany = 'clinic-iq';
        
        function switchCompany(companyId) {
            currentCompany = companyId;
            document.querySelectorAll('.company-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-company="${companyId}"]`).classList.add('active');
            document.querySelectorAll('.company-view').forEach(v => v.classList.remove('active'));
            document.getElementById(`company-${companyId}`).classList.add('active');
            document.getElementById('settings').classList.remove('active');
        }
        
        function showSettings() {
            document.querySelectorAll('.company-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.company-view').forEach(v => v.classList.remove('active'));
            document.getElementById('settings').classList.add('active');
            
            // Populate company dropdown
            let optHtml = '<option value="">Select company...</option>';
            data.companies.forEach(c => {
                optHtml += `<option value="${c.id}">${c.icon} ${c.name}</option>`;
            });
            document.getElementById('newProjectCompany').innerHTML = optHtml;
        }
        
        function render() {
            // Company tabs
            let tabsHtml = '';
            data.companies.forEach(c => {
                tabsHtml += `
                    <button class="company-tab ${c.id === currentCompany ? 'active' : ''}" data-company="${c.id}" onclick="switchCompany('${c.id}')">
                        <span class="dot" style="background:${c.color}"></span>
                        ${c.icon} ${c.name}
                    </button>
                `;
            });
            document.getElementById('companyTabs').innerHTML = tabsHtml;
            
            // Company views
            let viewsHtml = '';
            data.companies.forEach(company => {
                const projectLinks = company.projects.map(p => `
                    <a href="${p.url}" target="_blank" class="project-link-card">
                        <div class="project-link-info">
                            <div class="project-link-icon">📦</div>
                            <div>
                                <div class="project-link-name">${p.name}</div>
                                <div style="font-size:0.75rem; color:var(--gray)">${p.desc}</div>
                            </div>
                        </div>
                        <span class="project-link-status">${p.status}</span>
                    </a>
                `).join('');
                
                const completedHtml = company.completed.map(t => `
                    <div class="task-card priority-low">
                        <h4><i class="fas fa-check-circle" style="color:var(--success)"></i> ${t.title}</h4>
                        <div class="task-meta"><span><i class="fas fa-calendar"></i> ${t.date}</span></div>
                    </div>
                `).join('');
                
                const progressHtml = company.inProgress.map(t => `
                    <div class="task-card priority-${t.priority}">
                        <h4><i class="fas fa-spinner fa-spin" style="color:var(--primary)"></i> ${t.title}</h4>
                        <span class="status-badge-item status-progress">In Progress</span>
                    </div>
                `).join('');
                
                const todoHtml = company.todo.map(t => `
                    <div class="task-card priority-${t.priority}">
                        <h4><i class="fas fa-clock" style="color:var(--warning)"></i> ${t.title}</h4>
                        <span class="status-badge-item status-todo">To Do</span>
                    </div>
                `).join('');
                
                const actionsHtml = company.actions.map(a => `
                    <div class="action-item">
                        <div class="action-info">
                            <h4>${a.title}</h4>
                            <p>${a.desc}</p>
                        </div>
                        <button class="action-btn" onclick="alert('Action: ${a.title}')">Mark Done</button>
                    </div>
                `).join('');
                
                const teamHtml = data.team.map(m => `
                    <div class="team-card">
                        <div class="team-header">
                            <div class="team-avatar" style="background:${m.color}22; color:${m.color}">${m.icon}</div>
                            <div>
                                <div class="team-name">${m.name}</div>
                                <div class="team-role">${m.role}</div>
                            </div>
                            <div class="team-status"><span class="status-dot" style="background:${m.color}"></span> Active</div>
                        </div>
                        <div class="team-task"><strong>Working on:</strong> ${m.task}</div>
                    </div>
                `).join('');
                
                viewsHtml += `
                    <div id="company-${company.id}" class="company-view ${company.id === currentCompany ? 'active' : ''}">
                        <h2 style="font-size:1.5rem; margin-bottom:24px; display:flex; align-items:center; gap:12px;">
                            <span style="color:${company.color}">${company.icon}</span> ${company.name}
                        </h2>
                        
                        <!-- Stats -->
                        <div class="stats-row">
                            <div class="stat-card">
                                <div class="label">Projects</div>
                                <div class="value primary">${company.projects.length}</div>
                            </div>
                            <div class="stat-card">
                                <div class="label">Live</div>
                                <div class="value success">${company.projects.filter(p => p.status === 'Live').length}</div>
                            </div>
                            <div class="stat-card">
                                <div class="label">In Progress</div>
                                <div class="value warning">${company.inProgress.length}</div>
                            </div>
                            <div class="stat-card">
                                <div class="label">Actions Needed</div>
                                <div class="value danger">${company.actions.length}</div>
                            </div>
                        </div>
                        
                        <!-- Project Links -->
                        <div class="section">
                            <div class="section-header">
                                <div class="section-title"><i class="fas fa-external-link-alt"></i> Project Links</div>
                            </div>
                            <div class="project-links">${projectLinks}</div>
                        </div>
                        
                        <!-- Completed -->
                        <div class="section">
                            <div class="section-header">
                                <div class="section-title"><i class="fas fa-check-circle" style="color:var(--success)"></i> Completed</div>
                            </div>
                            <div class="task-grid">${completedHtml}</div>
                        </div>
                        
                        <!-- In Progress -->
                        <div class="section">
                            <div class="section-header">
                                <div class="section-title"><i class="fas fa-spinner" style="color:var(--primary)"></i> In Progress</div>
                            </div>
                            <div class="task-grid">${progressHtml}</div>
                        </div>
                        
                        <!-- To Do -->
                        <div class="section">
                            <div class="section-header">
                                <div class="section-title"><i class="fas fa-clock" style="color:var(--warning)"></i> To Do</div>
                            </div>
                            <div class="task-grid">${todoHtml}</div>
                        </div>
                        
                        <!-- Human Actions -->
                        <div class="section">
                            <div class="section-header">
                                <div class="section-title"><i class="fas fa-user" style="color:var(--danger)"></i> Human Actions Needed</div>
                            </div>
                            <div class="action-list">${actionsHtml}</div>
                        </div>
                        
                        <!-- Team -->
                        <div class="section">
                            <div class="section-header">
                                <div class="section-title"><i class="fas fa-users"></i> Team Activity</div>
                            </div>
                            <div class="team-grid">${teamHtml}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('companyViews').innerHTML = viewsHtml;
        }
        
        function addProject() {
            const name = document.getElementById('newProjectName').value;
            const companyId = document.getElementById('newProjectCompany').value;
            const desc = document.getElementById('newProjectDesc').value;
            const url = document.getElementById('newProjectUrl').value;
            
            if (!name || !companyId) {
                alert('Please fill in required fields');
                return;
            }
            
            const company = data.companies.find(c => c.id === companyId);
            if (company) {
                company.projects.push({
                    id: name.toLowerCase().replace(/\s+/g, '-'),
                    name: name,
                    desc: desc,
                    status: 'Planning',
                    url: url
                });
                saveData();
                render();
                document.getElementById('newProjectName').value = '';
                document.getElementById('newProjectDesc').value = '';
                document.getElementById('newProjectUrl').value = '';
            }
        }
        
        function addCompany() {
            const name = document.getElementById('newCompanyName').value;
            if (!name) {
                alert('Please enter a company name');
                return;
            }
            
            data.companies.push({
                id: name.toLowerCase().replace(/\s+/g, '-'),
                name: name,
                icon: '🏢',
                color: '#' + Math.floor(Math.random()*16777215).toString(16),
                projects: [],
                completed: [],
                inProgress: [],
                todo: [],
                actions: []
            });
            saveData();
            render();
            document.getElementById('newCompanyName').value = '';
        }
        
        // Initialize
        render();
    </script>
</body>
</html>
