<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSW Task Queue</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: #ffffff; 
            color: #1a1a1a; 
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        h1 { color: #004B2B; margin-bottom: 30px; font-size: 28px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input { 
            flex: 1; padding: 14px 18px; border: 2px solid #e0e0e0; 
            border-radius: 8px; font-size: 16px; outline: none;
        }
        input:focus { border-color: #004B2B; }
        button { 
            padding: 14px 28px; background: #004B2B; color: white; 
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
        }
        button:hover { background: #006b3d; }
        ul { list-style: none; }
        li { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px; border-bottom: 1px solid #eee; 
        }
        li.completed { text-decoration: line-through; color: #999; }
        .delete { 
            background: #ff4444; padding: 8px 14px; font-size: 14px;
        }
        .delete:hover { background: #cc3333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 JSW Task Queue</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a task..." onkeypress="handleKeypress(event)">
            <button onclick="addTask()">Add Task</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <script>
        const WEBHOOK_URL = 'https://hiv-finished-yeah-national.trycloudflare.com/task';
        
        function getTasks() {
            return JSON.parse(localStorage.getItem('jsw-tasks') || '[]');
        }
        
        function saveTasks(tasks) {
            localStorage.setItem('jsw-tasks', JSON.stringify(tasks));
        }
        
        function renderTasks() {
            const tasks = getTasks();
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.map((t, i) => `
                <li class="${t.completed ? 'completed' : ''}">
                    <span onclick="toggleTask(${i})">${t.text}</span>
                    <button class="delete" onclick="deleteTask(${i})">✕</button>
                </li>
            `).join('');
        }
        
        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;
            
            const tasks = getTasks();
            tasks.push({ text, completed: false });
            saveTasks(tasks);
            input.value = '';
            renderTasks();
            
            // Send to webhook
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({task: text})
            }).catch(e => console.log('Webhook error:', e));
        }
        
        function toggleTask(i) {
            const tasks = getTasks();
            tasks[i].completed = !tasks[i].completed;
            saveTasks(tasks);
            renderTasks();
        }
        
        function deleteTask(i) {
            const tasks = getTasks();
            tasks.splice(i, 1);
            saveTasks(tasks);
            renderTasks();
        }
        
        function handleKeypress(e) {
            if (e.key === 'Enter') addTask();
        }
        
        renderTasks();
    </script>
</body>
</html>
